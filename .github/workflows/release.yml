name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enable ad-hoc signing on macOS so M1/M2 (Apple Silicon) users can
          # launch the .app immediately after install.sh removes the quarantine
          # attribute. Without this, unsigned binaries are killed on launch
          # by macOS on ARM hardware regardless of quarantine state.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "技能管家 ${{ inputs.tag || github.ref_name }}"
          releaseBody: |
            一行命令安装（推荐，自动处理 macOS Gatekeeper）：

            **macOS / Linux**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/louiseliu/skills-master/${{ inputs.tag || github.ref_name }}/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://raw.githubusercontent.com/louiseliu/skills-master/${{ inputs.tag || github.ref_name }}/install.ps1 | iex
            ```

            **Homebrew (macOS)**
            ```bash
            brew install --cask --no-quarantine louiseliu/skills-master/skillsmaster
            ```

            ---

            See the assets below for direct downloads. If you drag the `.dmg` to `/Applications` manually on macOS, you may need to run:
            ```bash
            sudo xattr -rd com.apple.quarantine "/Applications/技能管家.app"
            ```
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
